<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CSOM™ Global — temporarily unavailable</title>
<meta name="description" content="CSOM Global is temporarily unavailable. The site is undergoing revisions and will return.">
<meta name="robots" content="noindex">

<link rel="preload" href="/fonts/inter-var-latin.woff2" as="font" type="font/woff2" crossorigin>
<link rel="preload" href="/fonts/space-grotesk-var-latin.woff2" as="font" type="font/woff2" crossorigin>

<style>
  @font-face {
    font-family: 'Inter';
    font-style: normal;
    font-weight: 300 900;
    font-display: swap;
    src: url('/fonts/inter-var-latin.woff2') format('woff2');
    unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
  }
  @font-face {
    font-family: 'Space Grotesk';
    font-style: normal;
    font-weight: 400 700;
    font-display: swap;
    src: url('/fonts/space-grotesk-var-latin.woff2') format('woff2');
    unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
  }

  :root {
    --light-bg:   #FFFFFF;
    --ink-dark:   #0E0E14;
    --ink-body:   #52525B;
    --ink-muted:  #71717A;
    --brand-orange: #F05A1E;
    --line:       #E4E4E7;
  }

  *, *::before, *::after { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--light-bg);
    color: var(--ink-body);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    font-size: 17px;
    line-height: 1.65;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
  }

  main {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 48px 24px;
    text-align: center;
  }

  .holding {
    max-width: 560px;
    width: 100%;
  }

  .wordmark {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: clamp(28px, 4vw, 36px);
    letter-spacing: -0.02em;
    color: var(--ink-dark);
    margin: 0 0 56px;
    line-height: 1.2;
  }

  .wordmark .tm {
    font-size: 0.42em;
    font-weight: 500;
    vertical-align: super;
    color: var(--brand-orange);
    margin-left: 2px;
    letter-spacing: 0;
  }

  .headline {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 600;
    font-size: clamp(20px, 2.6vw, 24px);
    letter-spacing: -0.01em;
    color: var(--ink-dark);
    margin: 0 0 24px;
    line-height: 1.35;
  }

  .body-line {
    font-size: 17px;
    color: var(--ink-body);
    margin: 0 0 16px;
    line-height: 1.65;
  }

  .body-line + .body-line {
    margin-top: 0;
  }

  .contact {
    margin-top: 28px;
    font-size: 16px;
    color: var(--ink-muted);
    line-height: 1.65;
  }

  .contact a {
    color: var(--ink-dark);
    text-decoration: none;
    border-bottom: 1px solid var(--line);
    padding-bottom: 1px;
    transition: border-color 160ms ease, color 160ms ease;
  }

  .contact a:hover,
  .contact a:focus-visible {
    color: var(--brand-orange);
    border-bottom-color: var(--brand-orange);
  }

  .contact a:focus-visible {
    outline: 2px solid var(--brand-orange);
    outline-offset: 4px;
    border-radius: 1px;
  }

  @media (max-width: 480px) {
    main { padding: 32px 20px; }
    .wordmark { margin-bottom: 40px; }
    .body-line { font-size: 16px; }
  }

  @media (prefers-reduced-motion: reduce) {
    .contact a { transition: none; }
  }
</style>
</head>
<body>
<main>
  <div class="holding" role="main">
    <h1 class="wordmark">CSOM<span class="tm">&trade;</span> Global</h1>
    <h2 class="headline">The site is temporarily unavailable.</h2>
    <p class="body-line">CSOM is undergoing revisions. The site will return.</p>
    <p class="contact">For any enquiries in the meantime, please write to <a href="mailto:contact@csom.global">contact@csom.global</a>.</p>
  </div>
</main>
</body>
</html>
